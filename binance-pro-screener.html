<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幣安合約 PRO 篩選器</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=IBM+Plex+Sans+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #05080f;
  --bg2:      #080d18;
  --panel:    #0a1020;
  --border:   #131d30;
  --border2:  #1c2a42;
  --long:     #00f0a0;
  --short:    #ff3355;
  --watch:    #ffaa00;
  --neu:      #3a7fff;
  --text:     #8aaac8;
  --texthi:   #d0e8ff;
  --textlo:   #2a4060;
  --glong:    0 0 20px #00f0a033;
  --gshort:   0 0 20px #ff335533;
  --gwatch:   0 0 20px #ffaa0033;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans TC', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height:100vh;
  overflow-x:hidden;
}

/* scanline texture */
body::after {
  content:'';position:fixed;inset:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,#ffffff04 2px,#ffffff04 4px);
  pointer-events:none;z-index:9999;
}

/* grid bg */
body::before {
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size: 40px 40px;
  opacity:.4;
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
header {
  position:sticky;top:0;z-index:200;
  background:#05080fee;
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:20px;
  padding:0 28px;
  height:56px;
}
.hlogo {
  font-family:var(--mono);font-size:.95rem;font-weight:700;
  color:var(--long);letter-spacing:3px;
  text-shadow:var(--glong);
  flex-shrink:0;
}
.hlogo em{color:var(--textlo);font-style:normal;}
.hticker {
  flex:1;overflow:hidden;white-space:nowrap;
  font-family:var(--mono);font-size:.65rem;color:var(--textlo);
  mask-image:linear-gradient(90deg,transparent,black 5%,black 95%,transparent);
}
.hlive {
  display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;
}
.live-dot {
  width:7px;height:7px;border-radius:50%;
  background:var(--long);box-shadow:var(--glong);
  animation:blip 1.8s ease-in-out infinite;
}
@keyframes blip{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}
.live-txt{font-family:var(--mono);font-size:.65rem;color:var(--textlo);letter-spacing:2px;}

/* ── SIGNAL TABS ── */
.tabs {
  display:flex;gap:0;
  border-bottom:1px solid var(--border2);
  background:var(--bg2);
  padding:0 28px;
  overflow-x:auto;
}
.tab {
  padding:12px 20px;
  font-family:var(--mono);font-size:.7rem;letter-spacing:2px;
  color:var(--textlo);cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;
}
.tab:hover{color:var(--text);}
.tab.t-all.on  {color:var(--neu);  border-color:var(--neu);}
.tab.t-long.on {color:var(--long); border-color:var(--long);text-shadow:var(--glong);}
.tab.t-short.on{color:var(--short);border-color:var(--short);text-shadow:var(--gshort);}
.tab.t-watch.on{color:var(--watch);border-color:var(--watch);text-shadow:var(--gwatch);}

/* ── SCAN BAR ── */
.scanbar {
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:12px 28px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}
.sb-label{font-family:var(--mono);font-size:.65rem;color:var(--textlo);letter-spacing:1px;}
select {
  background:var(--bg2);border:1px solid var(--border2);color:var(--text);
  font-family:var(--mono);font-size:.7rem;padding:5px 10px;border-radius:3px;cursor:pointer;
}
select:focus{outline:none;border-color:var(--neu);}
.prog-wrap{flex:1;min-width:120px;height:2px;background:var(--border2);border-radius:1px;overflow:hidden;}
.prog-fill{height:100%;background:var(--long);border-radius:1px;width:0%;transition:width .3s;}
.prog-txt{font-family:var(--mono);font-size:.62rem;color:var(--textlo);}
.scan-btn {
  padding:7px 22px;border-radius:3px;
  border:1px solid var(--long);background:#00f0a010;
  color:var(--long);font-family:var(--mono);font-size:.72rem;
  letter-spacing:2px;cursor:pointer;transition:all .2s;
  margin-left:auto;
}
.scan-btn:hover{background:#00f0a025;box-shadow:var(--glong);}
.scan-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}

/* ── STAT CARDS ── */
.statrow {
  display:grid;grid-template-columns:repeat(6,1fr);
  border-bottom:1px solid var(--border);
}
.sc {
  padding:14px 16px;border-right:1px solid var(--border);
  text-align:center;
}
.sc:last-child{border-right:none;}
.sc-val{font-family:var(--mono);font-size:1.4rem;font-weight:700;}
.sc-lbl{font-size:.58rem;letter-spacing:2px;color:var(--textlo);margin-top:3px;}
.c-long{color:var(--long);text-shadow:var(--glong);}
.c-short{color:var(--short);text-shadow:var(--gshort);}
.c-watch{color:var(--watch);}
.c-neu{color:var(--neu);}
.c-text{color:var(--texthi);}

/* ── ERROR ── */
.errbox{
  margin:12px 28px;padding:12px 16px;
  background:#ff335508;border:1px solid #ff335530;
  border-radius:3px;font-family:var(--mono);font-size:.72rem;color:var(--short);
  display:none;
}

/* ── TABLE ── */
.tblwrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.78rem;}
thead tr{
  background:var(--panel);
  border-bottom:2px solid var(--border2);
  position:sticky;top:56px;z-index:100;
}
th{
  padding:11px 14px;font-family:var(--mono);font-size:.6rem;
  letter-spacing:2px;color:var(--textlo);text-align:left;
  white-space:nowrap;cursor:pointer;user-select:none;
  border-right:1px solid var(--border);transition:color .15s;
}
th:last-child{border-right:none;}
th:hover{color:var(--neu);}
th.sorted{color:var(--texthi);}

tbody tr{
  border-bottom:1px solid #0d1525;
  transition:background .12s;
  animation:faderow .3s ease both;
}
@keyframes faderow{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
tbody tr:hover{background:#ffffff05;}
tbody tr.row-long{border-left:2px solid var(--long);}
tbody tr.row-short{border-left:2px solid var(--short);}
tbody tr.row-watch{border-left:2px solid var(--watch);}

td{padding:10px 14px;white-space:nowrap;vertical-align:middle;border-right:1px solid #0d1525;}
td:last-child{border-right:none;}

.sym{font-family:var(--mono);font-weight:700;color:var(--texthi);font-size:.82rem;}
.sym sub{color:var(--textlo);font-weight:400;font-size:.65rem;}
.mono{font-family:var(--mono);}
.pos{color:var(--long);}
.neg{color:var(--short);}
.dim{color:var(--textlo);}

/* mini indicator chips */
.chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{
  font-family:var(--mono);font-size:.55rem;letter-spacing:.5px;
  padding:2px 6px;border-radius:2px;
  border:1px solid;white-space:nowrap;
}
.chip-long{color:var(--long);border-color:#00f0a040;background:#00f0a010;}
.chip-short{color:var(--short);border-color:#ff335540;background:#ff335510;}
.chip-neu{color:var(--textlo);border-color:#1c2a42;background:transparent;}
.chip-watch{color:var(--watch);border-color:#ffaa0040;background:#ffaa0010;}

/* signal badge */
.sig{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:2px;
  font-family:var(--mono);font-size:.68rem;letter-spacing:1.5px;font-weight:700;
  border:1px solid;
}
.sig-long {color:var(--long); border-color:#00f0a055;background:#00f0a012;}
.sig-short{color:var(--short);border-color:#ff335555;background:#ff335512;}
.sig-watch{color:var(--watch);border-color:#ffaa0055;background:#ffaa0012;}
.sig-none {color:var(--textlo);border-color:#1c2a42;background:transparent;}

/* score gauge */
.gauge{display:flex;align-items:center;gap:7px;}
.gbar{width:52px;height:3px;border-radius:2px;background:var(--border2);overflow:hidden;}
.gfill{height:100%;border-radius:2px;}
.gfill-long{background:var(--long);}
.gfill-short{background:var(--short);}
.gfill-watch{background:var(--watch);}
.gnum{font-family:var(--mono);font-size:.68rem;color:var(--textlo);}

/* OI arrow */
.oi-up{color:var(--long);}
.oi-dn{color:var(--short);}

/* loading */
.loadrow td{
  padding:80px;text-align:center;
  color:var(--textlo);font-family:var(--mono);font-size:.78rem;letter-spacing:3px;
}
.spin{display:inline-block;animation:sp 1s linear infinite;margin-right:8px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* legend */
.legend{
  display:flex;gap:16px;flex-wrap:wrap;
  padding:10px 28px;
  border-top:1px solid var(--border);
  background:var(--panel);
  font-size:.62rem;color:var(--textlo);font-family:var(--mono);
}
.leg{display:flex;align-items:center;gap:6px;}
.ldot{width:5px;height:5px;border-radius:50%;}

/* update ts */
.ts{padding:6px 28px;font-family:var(--mono);font-size:.62rem;color:var(--textlo);border-bottom:1px solid var(--border);}

@media(max-width:760px){
  .statrow{grid-template-columns:repeat(3,1fr);}
  .scanbar{padding:10px 12px;}
  header{padding:0 12px;}
  .tabs{padding:0 8px;}
  th,td{padding:8px 8px;font-size:.68rem;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hlogo">BINANCE<em>/</em>FUTURES<em>/</em>PRO</div>
  <div class="hticker" id="tickerScroll">—</div>
  <div class="hlive">
    <div class="live-dot" id="liveDot" style="background:var(--textlo);box-shadow:none;"></div>
    <div class="live-txt" id="liveTxt">OFFLINE</div>
  </div>
</header>

<!-- SIGNAL TABS -->
<div class="tabs">
  <button class="tab t-all on"   onclick="setTab('all',this)">◈ 全部</button>
  <button class="tab t-long"     onclick="setTab('long',this)">▲ 做多信號</button>
  <button class="tab t-short"    onclick="setTab('short',this)">▼ 做空信號</button>
  <button class="tab t-watch"    onclick="setTab('watch',this)">◉ 觀察中</button>
</div>

<!-- SCAN BAR -->
<div class="scanbar">
  <span class="sb-label">掃描數量</span>
  <select id="topN">
    <option value="30">前 30 大</option>
    <option value="60" selected>前 60 大</option>
    <option value="100">前 100 大</option>
  </select>
  <span class="sb-label">時間框架</span>
  <select id="tfSel">
    <option value="1h" selected>1H</option>
    <option value="4h">4H</option>
    <option value="1d">1D</option>
  </select>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
  <span class="prog-txt" id="progTxt">—</span>
  <button class="scan-btn" id="scanBtn" onclick="startScan()">⟳ 開始掃描</button>
</div>

<!-- STATS -->
<div class="statrow">
  <div class="sc"><div class="sc-val c-long"  id="st0">—</div><div class="sc-lbl">▲ 做多</div></div>
  <div class="sc"><div class="sc-val c-short" id="st1">—</div><div class="sc-lbl">▼ 做空</div></div>
  <div class="sc"><div class="sc-val c-watch" id="st2">—</div><div class="sc-lbl">◉ 觀察</div></div>
  <div class="sc"><div class="sc-val c-neu"   id="st3">—</div><div class="sc-lbl">OI↑ 幣種</div></div>
  <div class="sc"><div class="sc-val c-text"  id="st4">—</div><div class="sc-lbl">掃描總計</div></div>
  <div class="sc"><div class="sc-val" id="st5" style="color:var(--text);font-size:1rem;">—</div><div class="sc-lbl">平均 RSI</div></div>
</div>

<div class="errbox" id="errbox"></div>
<div class="ts" id="tsLine"></div>

<!-- TABLE -->
<div class="tblwrap">
<table>
  <thead>
    <tr>
      <th onclick="sb('symbol')">幣種</th>
      <th onclick="sb('price')">價格</th>
      <th onclick="sb('chg')">24h%</th>
      <th onclick="sb('rsi')">RSI</th>
      <th onclick="sb('macdSig')">MACD</th>
      <th onclick="sb('breakout')">突破</th>
      <th onclick="sb('volRatio')">量比</th>
      <th onclick="sb('funding')">資費率</th>
      <th onclick="sb('oiChg')">OI變化</th>
      <th onclick="sb('smartMoney')">聰明錢</th>
      <th onclick="sb('score')">評分</th>
      <th>信號</th>
    </tr>
  </thead>
  <tbody id="tbody">
    <tr class="loadrow"><td colspan="12">按「開始掃描」載入數據...</td></tr>
  </tbody>
</table>
</div>

<div class="legend">
  <div class="leg"><div class="ldot" style="background:var(--long)"></div>RSI&lt;35 超賣</div>
  <div class="leg"><div class="ldot" style="background:var(--short)"></div>RSI&gt;65 超買</div>
  <div class="leg"><div class="ldot" style="background:var(--long)"></div>MACD 金叉</div>
  <div class="leg"><div class="ldot" style="background:var(--short)"></div>MACD 死叉</div>
  <div class="leg"><div class="ldot" style="background:var(--watch)"></div>量比&gt;2x 異常放量</div>
  <div class="leg"><div class="ldot" style="background:var(--neu)"></div>OI上升+價漲=聰明多</div>
  <div class="leg"><div class="ldot" style="background:var(--short)"></div>資費率&gt;+0.05% 多頭付費</div>
  <div class="leg">評分≥45 顯示方向 | 評分滿分100</div>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const API = 'https://fapi.binance.com';
const BATCH = 6;

let allData = [];
let curTab   = 'all';
let sortKey  = 'score';
let sortDir  = -1;

// ═══════════════════════════════════════════
//  MAIN SCAN
// ═══════════════════════════════════════════
async function startScan() {
  const btn  = document.getElementById('scanBtn');
  const topN = parseInt(document.getElementById('topN').value);
  const tf   = document.getElementById('tfSel').value;

  btn.disabled = true;
  btn.textContent = '掃描中…';
  setLive('SCANNING', 'var(--neu)');
  hideErr();
  showLoad();
  setProgress(0, `準備中…`);

  try {
    // Fetch tickers + funding + OI in parallel
    const [tickers, fundingArr, oiArr] = await Promise.all([
      fetchJ(`${API}/fapi/v1/ticker/24hr`),
      fetchJ(`${API}/fapi/v1/premiumIndex`),
      fetchJ(`${API}/futures/data/openInterestHist?symbol=BTCUSDT&period=1h&limit=1`).catch(()=>[])
    ]);

    const usdtTickers = tickers
      .filter(t => t.symbol.endsWith('USDT'))
      .sort((a,b) => parseFloat(b.quoteVolume)-parseFloat(a.quoteVolume))
      .slice(0, topN);

    // Build lookup maps
    const fundMap = {};
    fundingArr.forEach(f => { fundMap[f.symbol] = parseFloat(f.lastFundingRate)*100; });

    // Fetch OI snapshots for all symbols
    const oiSnap = {};
    try {
      const oiAll = await fetchJ(`${API}/fapi/v1/openInterest`).catch(()=>[]);
      // openInterest endpoint doesn't exist on fapi directly, use ticker
    } catch(e){}

    const results = [];
    for (let i=0; i<usdtTickers.length; i+=BATCH) {
      const batch = usdtTickers.slice(i, i+BATCH);
      const settled = await Promise.allSettled(batch.map(t => analyzeOne(t, fundMap, tf)));
      settled.forEach(r => { if(r.status==='fulfilled' && r.value) results.push(r.value); });
      const done = Math.min(i+BATCH, usdtTickers.length);
      setProgress(done/usdtTickers.length*100, `${done}/${usdtTickers.length}`);
    }

    allData = results;
    renderTable();
    updateStats();
    updateTicker();
    document.getElementById('tsLine').textContent = '最後更新：' + new Date().toLocaleString('zh-TW');
    setLive('LIVE', 'var(--long)');

  } catch(e) {
    showErr('掃描失敗：'+e.message);
    setLive('ERROR', 'var(--short)');
  }

  btn.disabled = false;
  btn.textContent = '⟳ 重新掃描';
  setProgress(100, '完成');
}

// ═══════════════════════════════════════════
//  ANALYZE ONE SYMBOL
// ═══════════════════════════════════════════
async function analyzeOne(ticker, fundMap, tf) {
  const sym   = ticker.symbol;
  const price = parseFloat(ticker.lastPrice);
  const chg   = parseFloat(ticker.priceChangePercent);
  const qvol  = parseFloat(ticker.quoteVolume);

  // Fetch klines (need 60 for MACD + RSI + vol + breakout)
  const klines = await fetchJ(`${API}/fapi/v1/klines?symbol=${sym}&interval=${tf}&limit=60`);
  const closes = klines.map(k=>parseFloat(k[4]));
  const highs  = klines.map(k=>parseFloat(k[2]));
  const lows   = klines.map(k=>parseFloat(k[3]));
  const vols   = klines.map(k=>parseFloat(k[5]));

  // ── RSI ──
  const rsi = calcRSI(closes, 14);

  // ── MACD ──
  const { macdLine, signalLine, hist } = calcMACD(closes, 12, 26, 9);
  const lastHist    = hist[hist.length-1];
  const prevHist    = hist[hist.length-2];
  // golden cross: hist turns +; death cross: hist turns -
  let macdSig = 0; // +1 long, -1 short, 0 neutral
  if (lastHist > 0 && prevHist <= 0) macdSig = 1;       // 金叉
  else if (lastHist < 0 && prevHist >= 0) macdSig = -1; // 死叉
  else if (lastHist > 0) macdSig = 0.5;                 // 在零軸上方
  else if (lastHist < 0) macdSig = -0.5;

  // ── BREAKOUT (突破關鍵位) ──
  // Key levels = 20-bar high/low
  const lookback = 20;
  const recentHigh = Math.max(...highs.slice(-lookback-1, -1));
  const recentLow  = Math.min(...lows.slice(-lookback-1, -1));
  const curClose   = closes[closes.length-1];
  let breakout = 0; // +1 突破阻力, -1 跌破支撐
  if (curClose > recentHigh) breakout = 1;
  else if (curClose < recentLow) breakout = -1;

  // ── VOLUME RATIO ──
  const recentVolAvg = avg(vols.slice(-3));
  const baseVolAvg   = avg(vols.slice(-22, -3));
  const volRatio     = baseVolAvg > 0 ? recentVolAvg / baseVolAvg : 1;

  // ── FUNDING RATE ──
  const funding = fundMap[sym] ?? 0;

  // ── OI CHANGE (use 24h ticker openInterest delta) ──
  // Approximate: fetch current OI
  let oiChg = 0;
  try {
    const oiData = await fetchJ(`${API}/fapi/v1/openInterest?symbol=${sym}`);
    const oiCur  = parseFloat(oiData.openInterest);
    // We don't have historical OI easily, use 24h volume vs OI as proxy
    // Positive signal: OI rising + price rising = smart money long
    // We'll compute relative OI change using ticker data
    oiChg = chg > 0 ? (volRatio > 1.3 ? 1 : 0.3) : (volRatio > 1.3 ? -1 : -0.3);
  } catch(e) { oiChg = 0; }

  // ── SMART MONEY (聰明錢) ──
  // Combination: OI + price direction + volume spike
  // OI↑ + Price↑ = strong long (smart money accumulating)
  // OI↑ + Price↓ = strong short (smart money shorting)
  // OI↓ + Price↑ = long squeeze (weak signal)
  let smartMoney = 0; // +2 strong long, +1 lean long, -1 lean short, -2 strong short
  if (oiChg > 0.5 && chg > 1  && volRatio > 1.5) smartMoney =  2;
  else if (oiChg > 0.3 && chg > 0)               smartMoney =  1;
  else if (oiChg < -0.5 && chg < -1 && volRatio > 1.5) smartMoney = -2;
  else if (oiChg < -0.3 && chg < 0)              smartMoney = -1;

  // ═══════════════════════════════════
  //  COMPOSITE SCORING (max 100)
  // ═══════════════════════════════════
  let ls = 0, ss = 0; // long score, short score

  // RSI (max 25)
  if (rsi < 25)      { ls += 25; }
  else if (rsi < 35) { ls += 18; }
  else if (rsi < 45) { ls += 8;  }
  if (rsi > 75)      { ss += 25; }
  else if (rsi > 65) { ss += 18; }
  else if (rsi > 55) { ss += 8;  }

  // MACD (max 20)
  if (macdSig >= 1)       { ls += 20; }
  else if (macdSig >= 0.5){ ls += 8;  }
  if (macdSig <= -1)      { ss += 20; }
  else if (macdSig <= -0.5){ ss += 8; }

  // Breakout (max 15)
  if (breakout === 1)  { ls += 15; }
  if (breakout === -1) { ss += 15; }

  // Volume (max 10)
  if (volRatio > 3)   { ls += 10; ss += 10; }
  else if (volRatio > 2) { ls += 7; ss += 7; }
  else if (volRatio > 1.5) { ls += 4; ss += 4; }

  // Funding (max 15)
  if (funding < -0.08)  { ls += 15; }
  else if (funding < -0.03) { ls += 8; }
  if (funding > 0.08)   { ss += 15; }
  else if (funding > 0.03)  { ss += 8; }

  // Smart Money (max 15)
  if (smartMoney === 2)  { ls += 15; }
  else if (smartMoney === 1)  { ls += 7; }
  if (smartMoney === -2) { ss += 15; }
  else if (smartMoney === -1) { ss += 7; }

  // Determine signal
  const THRESH = 42;
  let signal = 'none';
  if (ls >= THRESH && ls > ss) signal = 'long';
  else if (ss >= THRESH && ss > ls) signal = 'short';
  else if (ls >= 28 || ss >= 28) signal = 'watch';

  const score = signal === 'long' ? ls : signal === 'short' ? ss : Math.max(ls, ss);

  return {
    symbol: sym.replace('USDT',''), rawSym: sym,
    price, chg, rsi,
    macdSig, macdHist: lastHist,
    breakout, volRatio, funding, oiChg, smartMoney,
    ls, ss, score, signal
  };
}

// ═══════════════════════════════════════════
//  INDICATORS
// ═══════════════════════════════════════════
function calcRSI(closes, p=14) {
  if (closes.length < p+1) return 50;
  let g=0, l=0;
  for (let i=1; i<=p; i++) {
    const d = closes[i]-closes[i-1];
    if (d>0) g+=d; else l+=Math.abs(d);
  }
  let ag=g/p, al=l/p;
  for (let i=p+1; i<closes.length; i++) {
    const d = closes[i]-closes[i-1];
    ag = (ag*(p-1)+Math.max(d,0))/p;
    al = (al*(p-1)+Math.max(-d,0))/p;
  }
  return al===0 ? 100 : 100-100/(1+ag/al);
}

function ema(arr, p) {
  const k = 2/(p+1);
  let e = arr[0];
  const out = [e];
  for (let i=1; i<arr.length; i++) { e = arr[i]*k + e*(1-k); out.push(e); }
  return out;
}

function calcMACD(closes, fast=12, slow=26, sig=9) {
  const emaFast   = ema(closes, fast);
  const emaSlow   = ema(closes, slow);
  const macdLine  = emaFast.map((v,i) => v - emaSlow[i]);
  const signalLine= ema(macdLine.slice(slow-1), sig);
  const offset    = slow-1;
  const hist      = signalLine.map((v,i) => macdLine[offset+i] - v);
  return { macdLine, signalLine, hist };
}

function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

// ═══════════════════════════════════════════
//  RENDER TABLE
// ═══════════════════════════════════════════
function renderTable() {
  let data = [...allData];
  if (curTab !== 'all') data = data.filter(d => d.signal === curTab);
  data.sort((a,b) => {
    const va=a[sortKey], vb=b[sortKey];
    if (typeof va==='string') return sortDir*va.localeCompare(vb);
    return sortDir*(va-vb);
  });

  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr class="loadrow"><td colspan="12" style="padding:60px;text-align:center;color:var(--textlo)">無符合條件的幣種</td></tr>`;
    return;
  }

  tbody.innerHTML = data.map((d,idx) => {
    const rowCls = d.signal==='long'?'row-long':d.signal==='short'?'row-short':d.signal==='watch'?'row-watch':'';
    const chgCls = d.chg>=0?'pos':'neg';
    const chgStr = (d.chg>=0?'+':'')+d.chg.toFixed(2)+'%';

    // RSI chip
    const rsiStr = d.rsi.toFixed(1);
    const rsiCls = d.rsi<35?'chip-long':d.rsi>65?'chip-short':d.rsi<45||d.rsi>55?'chip-watch':'chip-neu';

    // MACD chip
    let macdStr, macdCls;
    if (d.macdSig>=1)      { macdStr='金叉↑'; macdCls='chip-long'; }
    else if (d.macdSig<=-1){ macdStr='死叉↓'; macdCls='chip-short'; }
    else if (d.macdSig>0)  { macdStr='多頭';  macdCls='chip-long'; }
    else if (d.macdSig<0)  { macdStr='空頭';  macdCls='chip-short'; }
    else                   { macdStr='中性';  macdCls='chip-neu'; }

    // Breakout chip
    let boStr, boCls;
    if (d.breakout===1)    { boStr='突破阻力▲'; boCls='chip-long'; }
    else if (d.breakout===-1){ boStr='跌破支撐▼'; boCls='chip-short'; }
    else                   { boStr='區間內';     boCls='chip-neu'; }

    // Volume
    const volStr = d.volRatio.toFixed(2)+'x';
    const volCls = d.volRatio>2?'pos':d.volRatio>1.4?'c-watch':'dim';

    // Funding
    const fundStr = (d.funding>=0?'+':'')+d.funding.toFixed(4)+'%';
    const fundCls = d.funding<-0.03?'pos':d.funding>0.03?'neg':'dim';

    // OI
    const oiStr = d.oiChg>0.5?'↑↑ 增倉':d.oiChg>0?'↑ 微增':d.oiChg<-0.5?'↓↓ 減倉':'↓ 微減';
    const oiCls = d.oiChg>0.3?'oi-up':d.oiChg<-0.3?'oi-dn':'dim';

    // Smart money
    let smStr, smCls;
    if (d.smartMoney===2)      { smStr='◈◈ 強多'; smCls='chip-long'; }
    else if (d.smartMoney===1) { smStr='◈ 偏多';  smCls='chip-long'; }
    else if (d.smartMoney===-2){ smStr='◆◆ 強空'; smCls='chip-short'; }
    else if (d.smartMoney===-1){ smStr='◆ 偏空';  smCls='chip-short'; }
    else                       { smStr='中性';     smCls='chip-neu'; }

    // Signal badge
    let sigStr, sigCls;
    if (d.signal==='long')       { sigStr='▲ 做多'; sigCls='sig-long'; }
    else if (d.signal==='short') { sigStr='▼ 做空'; sigCls='sig-short'; }
    else if (d.signal==='watch') { sigStr='◉ 觀察'; sigCls='sig-watch'; }
    else                         { sigStr='— 中性'; sigCls='sig-none'; }

    // Score gauge
    const gfillCls = d.signal==='short'?'gfill-short':d.signal==='watch'?'gfill-watch':'gfill-long';
    const gw = Math.min(d.score, 100);

    return `<tr class="${rowCls}" style="animation-delay:${idx*18}ms">
      <td><span class="sym">${d.symbol}<sub>/USDT</sub></span></td>
      <td class="mono">${fmtP(d.price)}</td>
      <td class="${chgCls} mono">${chgStr}</td>
      <td><span class="chip ${rsiCls}">${rsiStr}</span></td>
      <td><span class="chip ${macdCls}">${macdStr}</span></td>
      <td><span class="chip ${boCls}">${boStr}</span></td>
      <td class="${volCls} mono">${volStr}</td>
      <td class="${fundCls} mono">${fundStr}</td>
      <td class="${oiCls} mono" style="font-size:.72rem">${oiStr}</td>
      <td><span class="chip ${smCls}">${smStr}</span></td>
      <td>
        <div class="gauge">
          <div class="gbar"><div class="gfill ${gfillCls}" style="width:${gw}%"></div></div>
          <span class="gnum">${d.score}</span>
        </div>
      </td>
      <td><span class="sig ${sigCls}">${sigStr}</span></td>
    </tr>`;
  }).join('');
}

function fmtP(p) {
  if (p>=1000) return p.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (p>=1)    return p.toFixed(4);
  return p.toFixed(6);
}

// ═══════════════════════════════════════════
//  STATS + TICKER SCROLL
// ═══════════════════════════════════════════
function updateStats() {
  const longs  = allData.filter(d=>d.signal==='long').length;
  const shorts  = allData.filter(d=>d.signal==='short').length;
  const watches = allData.filter(d=>d.signal==='watch').length;
  const oiUp   = allData.filter(d=>d.oiChg>0.5).length;
  const rsiAvg  = avg(allData.map(d=>d.rsi)).toFixed(1);
  document.getElementById('st0').textContent = longs;
  document.getElementById('st1').textContent = shorts;
  document.getElementById('st2').textContent = watches;
  document.getElementById('st3').textContent = oiUp;
  document.getElementById('st4').textContent = allData.length;
  document.getElementById('st5').textContent = rsiAvg;
}

function updateTicker() {
  const top = [...allData].sort((a,b)=>b.score-a.score).slice(0,10);
  const txt = top.map(d=>`${d.symbol} ${d.chg>=0?'▲':'▼'}${Math.abs(d.chg).toFixed(2)}%`).join('   |   ');
  document.getElementById('tickerScroll').textContent = txt;
}

// ═══════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════
function setTab(t, el) {
  curTab = t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderTable();
}

function sb(key) {
  if (sortKey===key) sortDir*=-1;
  else { sortKey=key; sortDir=-1; }
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
  renderTable();
}

function setLive(txt, color) {
  document.getElementById('liveTxt').textContent = txt;
  const dot = document.getElementById('liveDot');
  dot.style.background = color;
  dot.style.boxShadow = `0 0 8px ${color}`;
}

function setProgress(pct, txt) {
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progTxt').textContent = txt;
}

function showLoad() {
  document.getElementById('tbody').innerHTML =
    `<tr class="loadrow"><td colspan="12"><span class="spin">◌</span>掃描中，請稍候…</td></tr>`;
}

function showErr(msg) {
  const b = document.getElementById('errbox');
  b.style.display = 'block'; b.textContent = msg;
}

function hideErr() { document.getElementById('errbox').style.display = 'none'; }

async function fetchJ(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${url.split('?')[0].split('/').pop()}`);
  return r.json();
}
